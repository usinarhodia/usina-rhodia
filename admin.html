<body>

    <div id="loginAdmin">

  <input type="password" id="passwordAdmin" placeholder="Contraseña">

</div>

<h2 style="margin-top:60px;">
  Productos activos
</h2>

<h2 style="margin-top:60px;">
  Pedidos
</h2>

<div id="pedidos"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

    async function entrarAdmin(){
  const pass = document.getElementById("passwordAdmin").value;

  const response = await fetch("https://usina-rhodia-production.up.railway.app/admin/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      password: pass
    })
  });

  const data = await response.json();

  if(data.success){
    document.getElementById("loginAdmin").style.display = "none";
    document.getElementById("panelAdmin").style.display = "block";
    sessionStorage.setItem("adminLogueado", "true");
  }else{
    alert("Contraseña incorrecta");
  }
}

if(sessionStorage.getItem("adminLogueado") === "true"){
  setTimeout(() => {
    document.getElementById("loginAdmin").style.display = "none";
    document.getElementById("panelAdmin").style.display = "block";
  }, 100);
}

const supabaseUrl = "https://vegbamfkmcyvgvnjmxgs.supabase.co";
const supabaseKey = "sb_publishable_BFRP4PzzRhvUw3OF0NZtpw_gXjejWn9";

const supabaseClient = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function cargarPedidos(){

  const { data, error } = await supabaseClient
    .from("orders")
.select(`
  *,
  order_items (*)
`)
    .order("id", { ascending:false });

  if(error){
    console.log(error);
    return;
  }

  const contenedor = document.getElementById("pedidos");

  contenedor.innerHTML = "";

  data.forEach(pedido => {

    contenedor.innerHTML += `

      <div class="pedido">

        <h2>Pedido #${pedido.id}</h2>

        <p><b>Cliente:</b> ${pedido.customer_name}</p>

        <p><b>Email:</b> ${pedido.customer_email}</p>

        <p><b>Teléfono:</b> ${pedido.customer_phone}</p>

        <p><b>DNI:</b> ${pedido.customer_dni || "-"}</p>

        <p><b>Total:</b> $${pedido.total}</p>
        <p><b>Productos:</b></p>

<ul>
  ${pedido.order_items.map(item => `
    <li>
      ${item.product_name} — Color ${item.color || "-"} — Talle ${item.size} — x${item.quantity} — $${item.unit_price}
    </li>
  `).join("")}
</ul>

        <p><b>Entrega:</b> ${pedido.delivery_method}</p>
        <p><b>Dirección:</b> ${pedido.address || "-"}</p>
<p><b>Piso / Departamento:</b> ${pedido.floor_apartment || "-"}</p>
<p><b>Ciudad:</b> ${pedido.city || "-"}</p>
<p><b>Código postal:</b> ${pedido.postal_code || "-"}</p>

        <div class="estado ${pedido.status}">
          ${pedido.status}
        </div>
<div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;">

  <button onclick="cambiarEstadoPedido(${pedido.id}, 'preparado')">
    Preparado
  </button>

  <button onclick="cambiarEstadoPedido(${pedido.id}, 'enviado')">
    Enviado
  </button>

  <button onclick="cambiarEstadoPedido(${pedido.id}, 'entregado')">
    Entregado
  </button>

  <button onclick="cambiarEstadoPedido(${pedido.id}, 'ready_pickup')">
  Listo para retirar
</button>

<div style="margin-top:20px; width:100%;">

  <input
    type="text"
    id="tracking-${pedido.id}"
    placeholder="Código Andreani"
    style="
      width:100%;
      margin-bottom:10px;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#1a1a1a;
      color:white;
    "
  >

  <input
    type="text"
    id="trackingurl-${pedido.id}"
    placeholder="Link seguimiento"
    style="
      width:100%;
      margin-bottom:10px;
      padding:12px;
      border-radius:10px;
      border:none;
      background:#1a1a1a;
      color:white;
    "
  >

  <button onclick="guardarTracking(${pedido.id})">
    Guardar tracking
  </button>

</div>

</div>
      </div>

    `;

  });

}

cargarPedidos();

async function cargarProductos(){

  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .order("id", { ascending:false });

  if(error){
    console.log(error);
    alert("Error cargando productos");
    return;
  }

  const contenedor = document.getElementById("productos");

  contenedor.innerHTML = "";

  data.forEach(producto => {

    contenedor.innerHTML += `

      <div class="pedido">

        <h2>${producto.name}</h2>

        <p><b>Marca:</b> ${producto.brand}</p>
        <p><b>Precio:</b> $${producto.price}</p>
        <p><b>Descuento:</b> -${producto.discount}%</p>
        <p><b>Activo:</b> ${producto.active ? "Sí" : "No"}</p>

        <button onclick="desactivarProducto(${producto.id})">
          Desactivar
        </button>

        <button onclick="eliminarProducto(${producto.id})">
  Eliminar
</button>

      </div>

    `;

  });

}

cargarProductos();

async function desactivarProducto(id){

  const { error } = await supabaseClient
    .from("products")
    .update({
      active: false
    })
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Error desactivando producto");
    return;
  }

  alert("Producto desactivado");
  cargarProductos();
}

async function eliminarProducto(id){

  const confirmar = confirm("¿Seguro que querés eliminar este producto definitivamente?");
  if(!confirmar) return;

  const response = await fetch("https://usina-rhodia-production.up.railway.app/admin/eliminar-producto", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  const resultado = await response.json();

  if(!response.ok){
    console.log(resultado);
    alert("Error eliminando producto");
    return;
  }

  alert("Producto eliminado");
  cargarProductos();
}

async function buscarArticulosBas(){
  const texto = document.getElementById("buscarBas").value.trim().toUpperCase();
  const select = document.getElementById("coditm");

  select.innerHTML = '<option value="">Buscando...</option>';

  if(texto.length < 2){
    select.innerHTML = '<option value="">Seleccioná un artículo BAS</option>';
    return;
  }

  const { data, error } = await supabaseClient
    .from("bas_articulos")
    .select('*')
    .ilike('"CODIGO"', `%${texto}%`)
    .limit(30);

  if(error){
    console.log("Error BAS:", error);
    select.innerHTML = '<option value="">Error buscando artículos</option>';
    return;
  }

  console.log("Resultados BAS:", data);

  select.innerHTML = '<option value="">Seleccioná un artículo BAS</option>';

  data.forEach(item => {
    select.innerHTML += `
      <option value="${item.CODIGO}">
        ${item.CODIGO} - ${item.DESCRIPCION}
      </option>
    `;
  });
}

async function cargarCombinacionesBas(){
  const codigo = document.getElementById("coditm").value;

  if(!codigo) return;

  const { data, error } = await supabaseClient
    .from("bas_articulos_talles_colores")
    .select("*")
    .eq("CODIGO", codigo);

  if(error){
    console.log(error);
    return;
  }

  const tallesUnicos = [...new Set(data.map(x => x.TALLE))];
  const coloresUnicos = [...new Set(data.map(x => x.COLOR))];

  console.log("Talles BAS:", tallesUnicos);
  console.log("Colores BAS:", coloresUnicos);

  const contenedorColores = document.getElementById("coloresBasContainer");
contenedorColores.innerHTML = "";

const coloresSinRepetir = [];

data.forEach(item => {
  const yaExiste = coloresSinRepetir.some(color => color.COLOR === item.COLOR);

  if (!yaExiste) {
    coloresSinRepetir.push({
      COLOR: item.COLOR,
      NOMBRE_COLOR: item.NOMBRE_COLOR
    });
  }
});

coloresSinRepetir.forEach(color => {
  contenedorColores.innerHTML += `
    <label class="color-opcion">
     <label class="bas-color-item">
  <input 
    type="checkbox" 
    class="colorProducto" 
    value="${color.COLOR}"
    data-nombre="${color.NOMBRE_COLOR}"
  >
  <span>${color.NOMBRE_COLOR} (${color.COLOR})</span>
</label>
    </label>
  `;
});

}

async function crearProducto(tipo){

  const marca = document.getElementById("marca").value.trim();
  const nombre = document.getElementById("nombre").value.trim();
  const precioAnterior = Number(document.getElementById("precioAnterior").value);
  const precio = Number(document.getElementById("precio").value);
  const descuento = Number(document.getElementById("descuento").value);
  const coditm = document.getElementById("coditm").value;
  const imagenes = document.getElementById("imagenArchivo").files;
  const coloresSeleccionados = [
  ...document.querySelectorAll(".colorProducto:checked")
].map(color => color.value);
const coloresBasSeleccionados = [
  ...document.querySelectorAll("#coloresBasContainer .colorProducto:checked")
];

const basColor = coloresBasSeleccionados.map(color => color.value);
const basColorName = coloresBasSeleccionados.map(color => color.dataset.nombre);

if(imagenes.length === 0){
  alert("Seleccioná al menos una imagen");
  return;
}

  if(!marca || !nombre || !precioAnterior || !precio || !descuento || !coditm || basColor.length === 0 || imagenes.length === 0){
    alert("Completá todos los campos");
    return;
  }

  const imageUrls = [];

for(let i = 0; i < imagenes.length; i++){
  const archivo = imagenes[i];
  const nombreArchivo = Date.now() + "-" + i + "-" + archivo.name;

  const { error: errorUpload } = await supabaseClient
    .storage
    .from("productos")
    .upload(nombreArchivo, archivo);

  if(errorUpload){
    console.log(errorUpload);
    alert("Error subiendo imagen");
    return;
  }

  const { data: publicUrlData } = supabaseClient
    .storage
    .from("productos")
    .getPublicUrl(nombreArchivo);

  imageUrls.push(publicUrlData.publicUrl);
}

const tallesArriba = [
  { size: "XS", stock: Number(document.getElementById("stockXS").value) || 0 },
  { size: "S", stock: Number(document.getElementById("stockS").value) || 0 },
  { size: "M", stock: Number(document.getElementById("stockM").value) || 0 },
  { size: "L", stock: Number(document.getElementById("stockL").value) || 0 },
  { size: "XL", stock: Number(document.getElementById("stockXL").value) || 0 },
  { size: "XXL", stock: Number(document.getElementById("stockXXL").value) || 0 },
  { size: "XXXL", stock: Number(document.getElementById("stockXXXL").value) || 0 }
];

const tallesPantalon = [
  { size: "28", stock: Number(document.getElementById("stock28").value) || 0 },
  { size: "30", stock: Number(document.getElementById("stock30").value) || 0 },
  { size: "32", stock: Number(document.getElementById("stock32").value) || 0 },
  { size: "34", stock: Number(document.getElementById("stock34").value) || 0 },
  { size: "36", stock: Number(document.getElementById("stock36").value) || 0 },
  { size: "38", stock: Number(document.getElementById("stock38").value) || 0 },
  { size: "40", stock: Number(document.getElementById("stock40").value) || 0 },
  { size: "42", stock: Number(document.getElementById("stock42").value) || 0 }
];

const stocks = tipo === "pantalon" ? tallesPantalon : tallesArriba;

const response = await fetch("https://usina-rhodia-production.up.railway.app/admin/crear-producto", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    brand: marca,
    name: nombre,
    old_price: precioAnterior,
    price: precio,
    discount: descuento,
    coditm,
    bas_color: basColor,
    bas_color_name: basColorName,
    imageUrls,
    stocks
  })
});

const resultado = await response.json();

if(!response.ok){
  console.log(resultado);
  alert("Error creando producto");
  return;
}

  alert("Producto creado correctamente");

  document.getElementById("marca").value = "";
  document.getElementById("nombre").value = "";
  document.getElementById("precioAnterior").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("descuento").value = "";
  document.getElementById("imagenArchivo").value = "";
}

async function cambiarEstadoPedido(id, nuevoEstado){

  const { error } = await supabaseClient
    .from("orders")
    .update({
      status: nuevoEstado
    })
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Error cambiando estado");
    return;
  }

  alert("Estado actualizado");

  cargarPedidos();
}

async function guardarTracking(id){

  const trackingCode =
    document.getElementById(`tracking-${id}`).value;

  const trackingUrl =
    document.getElementById(`trackingurl-${id}`).value;

  const { error } = await supabaseClient
    .from("orders")
    .update({
      tracking_code: trackingCode,
      tracking_url: trackingUrl
    })
    .eq("id", id);

  if(error){
    console.log(error);
    alert("Error guardando tracking");
    return;
  }

  alert("Tracking guardado");

  cargarPedidos();

}

</script>
