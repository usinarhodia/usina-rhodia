let adminToken = null;

function adminHeaders(){
  return {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${adminToken}`

}
   
async function entrarAdmin(){
  const pass = document.getElementById("passwordAdmin").value;

  const response = await fetch("https://usina-rhodia-production.up.railway.app/admin/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      password: pass
    })
  });

  const data = await response.json();

  if(data.success){
    adminToken = data.token;

    document.getElementById("loginAdmin").style.display = "none";
    document.getElementById("panelAdmin").style.display = "block";

    cargarPedidos();
    cargarProductos();
  }else{
    alert("Contraseña incorrecta");
  }
}

});

  return;
}

const data = resultado.pedidos;
pedidosOriginales = data;
renderizarPedidos();
}

  >

` : ""}

async function buscarArticulosBas(){
  const texto = document.getElementById("buscarBas").value.trim().toUpperCase();
  const select = document.getElementById("coditm");

  select.innerHTML = '<option value="">Buscando...</option>';

  if(texto.length < 2){
    select.innerHTML = '<option value="">Seleccioná un artículo BAS</option>';
    return;
  }

  const { data, error } = await supabaseClient
    .from("bas_articulos")
    .select('*')
    .ilike('"CODIGO"', `%${texto}%`)
    .limit(30);

  if(error){
    console.log("Error BAS:", error);
    select.innerHTML = '<option value="">Error buscando artículos</option>';
    return;
  }

  console.log("Resultados BAS:", data);

  select.innerHTML = '<option value="">Seleccioná un artículo BAS</option>';

  data.forEach(item => {
    select.innerHTML += `
      <option value="${item.CODIGO}">
        ${item.CODIGO} - ${item.DESCRIPCION}
      </option>
    `;
  });
}

contenedorColores.innerHTML = "";

const coloresSinRepetir = [];

</label>

setTimeout(() => {

    input.addEventListener("change", () => {
  generarStockVariantes("arriba");
});
  });
}, 100);

function mostrarTalleVisual(talleBas){
  const mapa = {
    "038":"XS",
    "040":"S",
    "042":"M",
    "044":"L",
    "046":"XL",
    "048":"XXL",
    "050":"XXXL",
    "052":"XXXXL",

    "00XS":"XS",
    "00S":"S",
    "00M":"M",
    "00L":"L",
    "0XL":"XL",
    "XXL":"XXL",
    "3XL":"XXXL",
    "4XL":"XXXXL"
  };

  return mapa[talleBas] || talleBas;
}

async function generarStockVariantes(tipo){
  const codigo = document.getElementById("coditm").value;

  if(!codigo){
    alert("Primero seleccioná un artículo BAS");
    return;
  }

  const contenedor =
    tipo === "pantalon"
      ? document.getElementById("stockVariantesPantalon")
      : document.getElementById("stockVariantes");

  const colores = [
    ...document.querySelectorAll("#coloresBasContainer .colorProducto:checked")
  ];

  if(colores.length === 0){
    contenedor.innerHTML = "";
    return;
  }

  const { data, error } = await supabaseClient
    .from("bas_articulos_talles_colores")
    .select("*")
    .eq("CODIGO", codigo);

  if(error){
    console.log(error);
    alert("Error cargando talles BAS");
    return;
  }

  contenedor.innerHTML = "";

  colores.forEach(color => {
    const ordenTalles = ["XS", "S", "M", "L", "XL", "XXL", "XXXL", "XXXXL", "28", "30", "32", "34", "36", "38", "40", "42"];

const tallesDelColor = data
  .filter(item => item.COLOR === color.value)
  .sort((a, b) => {
    const talleA = mostrarTalleVisual(a.TALLE);
    const talleB = mostrarTalleVisual(b.TALLE);

    return ordenTalles.indexOf(talleA) - ordenTalles.indexOf(talleB);
  });

    contenedor.innerHTML += `
      <div style="background:#181818;padding:18px;border-radius:14px;margin-bottom:18px;">
        <h4>${color.dataset.nombre} (${color.value})</h4>

        ${tallesDelColor.map(item => `
          <input
            type="number"
            class="stockVariante"
            data-size="${mostrarTalleVisual(item.TALLE)}"
            data-bas-size="${item.TALLE}"
            data-color="${item.COLOR}"
            data-color-name="${item.NOMBRE_COLOR}"
            placeholder="Stock ${mostrarTalleVisual(item.TALLE)}"
            value="0"
            style="margin-bottom:8px;"
          >
        `).join("")}
      </div>
    `;
  });
}

function prepararStockPantalon(){
  console.log("Generando stock pantalón");

  generarStockVariantes("pantalon");

  const contenedor = document.getElementById("stockVariantesPantalon");

  if(!contenedor.innerHTML.trim()){

}

async function crearProducto(tipo){

  const marca = document.getElementById("marca").value.trim();
  const nombre = document.getElementById("nombre").value.trim();
  const precioAnterior = Number(document.getElementById("precioAnterior").value);
  const precio = Number(document.getElementById("precio").value);
  const descuento = Number(document.getElementById("descuento").value);
  const coditm = document.getElementById("coditm").value;
  const imagenes = document.getElementById("imagenArchivo").files;
  const coloresSeleccionados = [
  ...document.querySelectorAll(".colorProducto:checked")
].map(color => color.value);
const coloresBasSeleccionados = [
  ...document.querySelectorAll("#coloresBasContainer .colorProducto:checked")
];

const basColor = coloresBasSeleccionados.map(color => color.value);
const basColorName = coloresBasSeleccionados.map(color => color.dataset.nombre);

if(imagenes.length === 0){
  alert("Seleccioná al menos una imagen");
  return;
}

  if(!marca || !nombre || !precioAnterior || !precio || !descuento || !coditm || basColor.length === 0 || imagenes.length === 0){
    alert("Completá todos los campos");
    return;
  }

  const imageUrls = [];

for(let i = 0; i < imagenes.length; i++){
  const archivo = imagenes[i];
  const nombreArchivo = Date.now() + "-" + i + "-" + archivo.name;

  const { error: errorUpload } = await supabaseClient
    .storage
    .from("productos")
    .upload(nombreArchivo, archivo);

  if(errorUpload){
    console.log(errorUpload);
    alert("Error subiendo imagen");
    return;
  }

  const { data: publicUrlData } = supabaseClient
    .storage
    .from("productos")
    .getPublicUrl(nombreArchivo);

  imageUrls.push(publicUrlData.publicUrl);
}



const stocks = [
  ...document.querySelectorAll(".stockVariante")
].map(input => ({
  size: input.dataset.size,
  bas_size: input.dataset.basSize,
  color: input.dataset.color,
  color_name: input.dataset.colorName,
  stock: Number(input.value) || 0
}));

const response = await fetch("https://usina-rhodia-production.up.railway.app/admin/crear-producto", {
  method: "POST",
  headers: adminHeaders(),
  body: JSON.stringify({
    brand: marca,
    name: nombre,
    old_price: precioAnterior,
    price: precio,
    discount: descuento,
    coditm,
    bas_color: basColor,
    bas_color_name: basColorName,
    imageUrls,
    stocks
  })
});

const resultado = await response.json();

if(!response.ok){
  console.log(resultado);
  alert("Error creando producto");
  return;
}

  alert("Producto creado correctamente");

  document.getElementById("marca").value = "";
  document.getElementById("nombre").value = "";
  document.getElementById("precioAnterior").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("descuento").value = "";
  document.getElementById("imagenArchivo").value = "";
}

    method: "POST",
    headers: adminHeaders(),
    body: JSON.stringify({
      id,
      tracking_code: trackingCode,
      tracking_url: trackingUrl

  });

  const resultado = await response.json();

  if(!response.ok){
    console.log(resultado);
    alert("Error guardando tracking");
    return;
  }

  alert("Tracking guardado");
  cargarPedidos();
}

async function imprimirEtiquetaAndreani(orderId) {
  try {
    const response = await fetch(
      `https://usina-rhodia-production.up.railway.app/admin/andreani-etiqueta/${orderId}`,
      {
        headers: {
          Authorization: `Bearer ${adminToken}`
        }
      }
    );

    if (!response.ok) {
      const errorTexto = await response.text();
      throw new Error(errorTexto);
    }

    const pdf = await response.blob();
    const urlTemporal = URL.createObjectURL(pdf);

    const ventana = window.open(urlTemporal, "_blank");

    if (!ventana) {
      URL.revokeObjectURL(urlTemporal);
      alert("El navegador bloqueó la ventana de impresión");
      return;
    }

    setTimeout(() => {
      URL.revokeObjectURL(urlTemporal);
    }, 60000);

  } catch (error) {
    console.error("Error imprimiendo etiqueta:", error);
    alert("No se pudo abrir la etiqueta Andreani");
  }
}

</script>

</div>
