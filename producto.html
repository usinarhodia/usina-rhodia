<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USINA RHODIA | Producto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
    body { background: #0f0f0f; color: #fff; }
    a { text-decoration: none; color: inherit; }
    img { display: block; width: 100%; }

    .top-strip { width: 100%; background: #c91010; }
    .top-strip-inner { max-width: 1400px; margin: 0 auto; padding: 10px 28px; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
    .top-strip-left { font-size: 12px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; }
    .top-strip-right { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.92); }

    header { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .header-inner { max-width: 1400px; margin: 0 auto; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .logo { font-size: 24px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
    .header-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .header-link { font-size: 12px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: #ff2a2a; }

    .cart-link { display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 14px; background: #171717; border: 1px solid rgba(255,255,255,0.10); font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    .cart-count { min-width: 24px; height: 24px; padding: 0 7px; border-radius: 999px; background: #ff2a2a; font-size: 11px; font-weight: 900; display: inline-flex; align-items: center; justify-content: center; }

    .producto-page { max-width: 1400px; margin: 0 auto; padding: 28px; }
    .producto-layout { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 30px; align-items: start; }

    .galeria { display: grid; grid-template-columns: 100px 1fr; gap: 16px; position: sticky; top: 120px; }
    .miniaturas { display: flex; flex-direction: column; gap: 14px; }
    .miniatura { width: 100%; height: 120px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.10); background: #181818; cursor: pointer; }
    .miniatura.activa { border-color: #ff2a2a; }
    .miniatura img { height: 100%; object-fit: cover; }

    .imagen-principal { background: #171717; border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; overflow: hidden; min-height: 760px; }
    .imagen-principal img { height: 100%; min-height: 760px; object-fit: cover; }

    .info-producto { background: #171717; border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 34px; }
    .marca { display: inline-block; margin-bottom: 12px; color: #ff2a2a; font-size: 12px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; }
    .titulo-producto { font-size: 42px; line-height: 0.98; font-weight: 900; text-transform: uppercase; margin-bottom: 22px; }
    .precio-box { display: flex; align-items: end; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .precio-anterior { font-size: 20px; color: #8e8e8e; text-decoration: line-through; font-weight: 600; }
    .precio-actual { font-size: 44px; font-weight: 900; letter-spacing: -1px; }
    .descuento { background: #ff2a2a; padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

    .bloque { padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.08); }
    .bloque-titulo { font-size: 12px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: #ff2a2a; margin-bottom: 14px; }

    .talles { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .talle-btn { min-width: 86px; padding: 14px 18px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.10); background: #101010; color: #fff; font-size: 13px; font-weight: 800; cursor: pointer; }
    .talle-btn.activo { background: #ff2a2a; border-color: #ff2a2a; }
    .talle-btn.agotado { background: #1c1c1c; color: #6f6f6f; cursor: not-allowed; opacity: 0.55; }

    .stock-info { font-size: 14px; color: #d2d2d2; line-height: 1.5; min-height: 24px; }
    .stock-info strong { color: #fff; }

    .cantidad-box { margin-top: 18px; display: inline-flex; align-items: center; gap: 18px; background: #101010; border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 8px; }
    .cantidad-box button { width: 38px; height: 38px; border: none; border-radius: 12px; background: #ff2a2a; color: white; font-size: 18px; font-weight: 900; cursor: pointer; }
    .cantidad-box span { min-width: 28px; text-align: center; font-size: 15px; font-weight: 900; }

    .acciones { margin-top: 24px; }
    .btn-principal { width: 100%; border: none; border-radius: 16px; padding: 16px 18px; font-size: 13px; font-weight: 800; letter-spacing: 1.1px; text-transform: uppercase; cursor: pointer; background: #ff2a2a; color: #fff; }

    .notificacion { position: fixed; top: 20px; right: 20px; background: #171717; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; min-width: 260px; max-width: 320px; opacity: 0; transform: translateY(-20px); pointer-events: none; transition: all 0.3s ease; z-index: 9999; }
    .notificacion.activa { opacity: 1; transform: translateY(0); }
    .notificacion img { width: 50px; height: 60px; object-fit: cover; border-radius: 8px; }
    .notif-texto { display: flex; flex-direction: column; }
    .notif-texto strong { font-size: 13px; font-weight: 800; text-transform: uppercase; }
    .notif-texto span { font-size: 12px; color: #cfcfcf; }

    footer { border-top: 1px solid rgba(255,255,255,0.08); padding: 22px 28px; text-align: center; color: #b8b8b8; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 40px; }

    @media (max-width: 1200px) {
      .producto-layout { grid-template-columns: 1fr; }
      .galeria { position: static; }
      .imagen-principal, .imagen-principal img { min-height: 620px; }
    }

    @media (max-width: 780px) {
      .top-strip-inner, .header-inner, .producto-page, footer { padding-left: 16px; padding-right: 16px; }
      .top-strip-inner, .header-inner { flex-direction: column; align-items: flex-start; gap: 8px; }
      .header-actions { width: 100%; justify-content: flex-start; }
      .galeria { grid-template-columns: 1fr; }
      .miniaturas { flex-direction: row; overflow-x: auto; }
      .miniatura { min-width: 88px; height: 100px; }
      .imagen-principal, .imagen-principal img { min-height: 480px; }
      .info-producto { padding: 24px; }
      .titulo-producto { font-size: 30px; }
      .precio-actual { font-size: 36px; }
    }

    #colores{
  display:flex;
  gap:10px;
  margin:10px 0 20px;
}


.color-btn.activo{
  border-color:#ff2a2a;
}

#talles{
  margin-top: 16px;
}

.colores-producto{
  display:flex;
  gap:12px;
  margin-top:14px;
  margin-bottom:22px;
}


.color-btn.activo{
  background:#ff2a2a;
  border-color:#ff2a2a;
}

.colores-producto{
  display:flex;
  gap:18px;
  margin-top:14px;
  margin-bottom:28px;
}


.color-btn.activo{
  border-color:#ff2a2a;
  box-shadow:0 0 0 3px rgba(255,42,42,.25);
}

.color-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  color:white;
  font-size:11px;
  font-weight:bold;
  max-width:80px;
  text-align:center;
}

#talles{
  margin-top:16px;
}

#colores{
  display:flex;
  gap:12px;
  margin-top:14px;
  margin-bottom:26px;
}

.color-circulo{
  width:46px;
  height:46px;
  min-width:46px;
  border-radius:50%;
  border:2px solid #333;
  cursor:pointer;
}

.color-circulo.activo{
  border-color:#ff2a2a;
  box-shadow:0 0 0 4px rgba(255,42,42,.25);
}

#talles{
  margin-top:16px;
}

  </style>
</head>

<body>

  <div class="top-strip">
    <div class="top-strip-inner">
      <a href="index.html" class="top-strip-left">USINA RHODIA</a>
      <div class="top-strip-right">Ofertas por 24 horas · Stock limitado · Sin reposición</div>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">USINA RHODIA</a>

      <div class="header-actions">
        <a href="index.html" class="header-link">Volver a ofertas</a>
        <a href="carrito.html" class="cart-link">
          <span>Carrito</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="producto-page">
    <div class="producto-layout">

      <section class="galeria">
        <div class="miniaturas" id="miniaturas"></div>

        <div class="imagen-principal">
          <img id="imagenPrincipal" src="" alt="Producto principal">
        </div>
      </section>

      <section class="info-producto">
        <span class="marca" id="marcaProducto"></span>
        <h1 class="titulo-producto" id="nombreProducto"></h1>

        <div class="precio-box">
          <span class="precio-anterior" id="precioAnterior"></span>
          <span class="precio-actual" id="precioActual"></span>
          <span class="descuento" id="descuentoProducto"></span>
        </div>

        <div class="bloque-titulo">Elegí producto</div>

<div id="bloqueColor">
  <h3>Color</h3>
  <div id="colores" class="colores-producto"></div>
</div>

<h3 style="margin-top:24px;">Talle</h3>
<div class="talles" id="talles"></div>


          <div class="stock-info" id="stockInfo"></div>

          <div class="cantidad-box">
            <button type="button" onclick="cambiarCantidad(-1)">-</button>
            <span id="cantidadSeleccionada">1</span>
            <button type="button" onclick="cambiarCantidad(1)">+</button>
          </div>

          <div class="acciones">
            <button class="btn-principal" id="btnComprar" onclick="agregarAlCarrito()">Agregar al carrito</button>
          </div>
        </div>
      </section>

    </div>
  </main>

  <footer>
    USINA RHODIA — Producto
  </footer>

  <div id="notificacion" class="notificacion">
    <img id="notifImg" src="" alt="">
    <div class="notif-texto">
      <strong id="notifNombre"></strong>
      <span id="notifDetalle"></span>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://vegbamfkmcyvgvnjmxgs.supabase.co";
    const SUPABASE_KEY = "sb_publishable_BFRP4PzzRhvUw3OF0NZtpw_gXjejWn9";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const productoId = Number(params.get("id"));

    let productoActual = null;
    let talleSeleccionado = null;
    let stockSeleccionado = 0;
    let cantidadSeleccionada = 1;
    let colorSeleccionado = "";
    let colorNombreSeleccionado = "";

    function formatearPrecio(valor) {
      return "$" + valor.toLocaleString("es-AR");
    }

    async function cargarProducto() {
      const { data: producto, error } = await supabaseClient
        .from("products")
        .select("*")
        .eq("id", productoId)
        .single();

      if (error || !producto) {
        document.body.innerHTML = "<h1 style='color:white;padding:40px;'>Producto no encontrado</h1>";
        return;
      }

      productoActual = producto;

const bloqueColor = document.getElementById("bloqueColor");
const coloresDiv = document.getElementById("colores");

function obtenerColorVisual(nombreColor, codigoColor) {
  const nombre = (nombreColor || "").toUpperCase();

  if (nombre.includes("NEGRO")) return "#000000";
  if (nombre.includes("BLANCO")) return "#ffffff";
  if (nombre.includes("GRIS")) return "#777777";
  if (nombre.includes("AZUL")) return "#1f4fff";
  if (nombre.includes("ROJO")) return "#d60000";
  if (nombre.includes("VERDE")) return "#008000";
  if (nombre.includes("AMARILLO")) return "#ffd400";
  if (nombre.includes("CAMEL")) return "#c19a6b";
  if (nombre.includes("TOSTADO")) return "#8b5a2b";
  if (nombre.includes("MARINO")) return "#001f3f";
  if (nombre.includes("CELESTE")) return "#73c9ff";

  return "#222222";
}

if (productoActual.bas_color_name && productoActual.bas_color) {
  bloqueColor.style.display = "block";

  function convertirAArray(valor) {
  if (!valor) return [];

  if (Array.isArray(valor)) return valor;

  if (typeof valor === "string") {
    try {
      const parseado = JSON.parse(valor);
      if (Array.isArray(parseado)) return parseado;
    } catch (e) {}

    return valor
      .replace("{", "")
      .replace("}", "")
      .replace("[", "")
      .replace("]", "")
      .replaceAll('"', "")
      .split(",")
      .map(item => item.trim())
      .filter(Boolean);
  }

  return [valor];
}

const nombres = convertirAArray(productoActual.bas_color_name);
const codigos = convertirAArray(productoActual.bas_color);

  colorSeleccionado = codigos[0];
colorNombreSeleccionado = nombres[0];

  coloresDiv.innerHTML = nombres.map((nombre, index) => {
    const colorVisual = obtenerColorVisual(nombre, codigos[index]);

    return `
      <button
        class="color-circulo ${index === 0 ? "activo" : ""}"
        title="${nombre}"
        style="background:${colorVisual};"
        onclick="seleccionarColor('${codigos[index]}', '${nombres[index]}', this)"
      ></button>
    `;
  }).join("");

} else {
  bloqueColor.style.display = "none";
  coloresDiv.innerHTML = "";
}

      document.getElementById("marcaProducto").textContent = producto.brand;
      document.getElementById("nombreProducto").textContent = producto.name;
      document.getElementById("precioAnterior").textContent = formatearPrecio(producto.old_price);
      document.getElementById("precioActual").textContent = formatearPrecio(producto.price);
      document.getElementById("descuentoProducto").textContent = "-" + producto.discount + "%";

      await cargarImagenes();
      await cargarStock();
      actualizarContadorCarrito();
    }

    async function cargarImagenes() {
      const { data: imagenes } = await supabaseClient
        .from("product_images")
        .select("*")
        .eq("product_id", productoId)
        .order("position", { ascending: true });

      const miniaturas = document.getElementById("miniaturas");
      const imagenPrincipal = document.getElementById("imagenPrincipal");

      if (!imagenes || imagenes.length === 0) {
        imagenPrincipal.src = "img/producto-1.jpg";
        return;
      }

      imagenPrincipal.src = imagenes[0].image_url;

      miniaturas.innerHTML = imagenes.map((img, index) => `
        <button class="miniatura ${index === 0 ? "activa" : ""}" onclick="cambiarImagen('${img.image_url}', this)">
          <img src="${img.image_url}" alt="Vista ${index + 1}">
        </button>
      `).join("");
    }

    function colorCSS(color){
  const colores = {
    "Negro": "#000000",
    "Blanco": "#ffffff",
    "Azul": "#003cff",
    "Rojo": "#ff0000",
    "Verde": "#008000",
    "Beige": "#d6c3a3",
    "Gris": "#808080",
    "Celeste": "#7ec8e3"
  };

  return colores[color] || "#111";
}

    async function cargarStock() {
  let query = supabaseClient
    .from("product_stock")
    .select("*")
    .eq("product_id", productoId);

  if (colorSeleccionado) {
    query = query.eq("color", String(colorSeleccionado).trim());
  }

  const { data: stock } = await query;

  const talles = document.getElementById("talles");

  if (!stock || stock.length === 0) {
    talles.innerHTML = "<p>No hay stock disponible.</p>";
    return;
  }

  talles.innerHTML = stock.map((item, index) => `
    <button 
      class="talle-btn ${item.stock <= 0 ? "agotado" : ""} ${index === 0 && item.stock > 0 ? "activo" : ""}"
      ${item.stock <= 0 ? "disabled" : ""}
      onclick="seleccionarTalle('${item.size}', ${item.stock}, this)"
    >
      ${item.size}
    </button>
  `).join("");

  const primerDisponible = stock.find(item => item.stock > 0);

  if (primerDisponible) {
    talleSeleccionado = primerDisponible.size;
    stockSeleccionado = primerDisponible.stock;

    document.getElementById("stockInfo").innerHTML =
      `Color: <strong>${colorNombreSeleccionado}</strong> · Talle: <strong>${talleSeleccionado}</strong>`;
  }
}

    function cambiarImagen(nuevaImagen, boton) {
      document.getElementById("imagenPrincipal").src = nuevaImagen;
      document.querySelectorAll(".miniatura").forEach(item => item.classList.remove("activa"));
      boton.classList.add("activa");
    }

    function seleccionarTalle(talle, stock, boton) {
      talleSeleccionado = talle;
      stockSeleccionado = stock;
      cantidadSeleccionada = 1;

      document.getElementById("cantidadSeleccionada").textContent = cantidadSeleccionada;
      document.querySelectorAll(".talle-btn").forEach(item => item.classList.remove("activo"));
      boton.classList.add("activo");
      document.getElementById("stockInfo").innerHTML = `Talle seleccionado: <strong>${talleSeleccionado}</strong>`;
    }

    function cambiarCantidad(cambio) {
      const nuevaCantidad = cantidadSeleccionada + cambio;

      if (nuevaCantidad < 1) return;

      if (nuevaCantidad > stockSeleccionado) {
        mostrarNotificacion("No hay más stock disponible en talle " + talleSeleccionado);
        return;
      }

      cantidadSeleccionada = nuevaCantidad;
      document.getElementById("cantidadSeleccionada").textContent = cantidadSeleccionada;
    }

    function obtenerCarrito() {
      return JSON.parse(localStorage.getItem("carrito")) || [];
    }

    function guardarCarrito(carrito) {
      localStorage.setItem("carrito", JSON.stringify(carrito));
    }

    function agregarAlCarrito() {
      if (!productoActual || !talleSeleccionado || stockSeleccionado <= 0) return;

      let carrito = obtenerCarrito();

      const colorCarrito = colorNombreSeleccionado + " (" + colorSeleccionado + ")";

const existente = carrito.find(item =>
  item.product_id === productoActual.id &&
  item.talle === talleSeleccionado &&
  item.color === colorCarrito
);

      const cantidadActual = existente ? existente.cantidad : 0;

      if (cantidadActual + cantidadSeleccionada > stockSeleccionado) {
        mostrarNotificacion("No hay más stock disponible en talle " + talleSeleccionado);
        return;
      }

      const productoCarrito = {
        product_id: productoActual.id,
        marca: productoActual.brand,
        nombre: productoActual.name,
        precio: productoActual.price,
        talle: talleSeleccionado,
        color: colorCarrito,
        cantidad: cantidadSeleccionada,
        imagen: document.getElementById("imagenPrincipal").src
      };
      

      if (existente) {
        existente.cantidad += cantidadSeleccionada;
      } else {
        carrito.push(productoCarrito);
      }

      guardarCarrito(carrito);
      actualizarContadorCarrito();
      mostrarNotificacion("Talle " + talleSeleccionado + " agregado al carrito");
    }

    function mostrarNotificacion(mensaje) {
      const notif = document.getElementById("notificacion");
      const img = document.getElementById("notifImg");
      const nombre = document.getElementById("notifNombre");
      const detalle = document.getElementById("notifDetalle");

      img.src = document.getElementById("imagenPrincipal").src;
      nombre.textContent = productoActual ? productoActual.name : "Producto";
      detalle.textContent = mensaje;

      notif.classList.add("activa");

      setTimeout(() => {
        notif.classList.remove("activa");
      }, 2500);
    }

    function actualizarContadorCarrito() {
      const carrito = obtenerCarrito();
      const contador = document.getElementById("cartCount");
      if (!contador) return;

      const totalProductos = carrito.reduce((acc, item) => acc + item.cantidad, 0);
      contador.textContent = totalProductos;
    }

    function seleccionarColor(color, nombre, boton){
  colorSeleccionado = String(color).trim();
  colorNombreSeleccionado = nombre;

  document.querySelectorAll(".color-circulo").forEach(btn => {
    btn.classList.remove("activo");
  });

  boton.classList.add("activo");

  cargarStock();
}

    cargarProducto();
  </script>

</body>
