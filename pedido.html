<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi pedido | USINA RHODIA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  background:#050505;
  color:white;
  font-family:Arial;
  padding:40px;
}

.card{
  max-width:700px;
  margin:auto;
  background:#111;
  border:1px solid #222;
  border-radius:24px;
  padding:35px;
}

h1{
  font-size:42px;
  margin-bottom:20px;
}

.estado{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  font-weight:bold;
  margin:15px 0;
}

.pending{ background:#ff3b30; }
.paid{ background:#00c853; }
.preparado{ background:#ff9800; }
.enviado{ background:#2196f3; }
.entregado{ background:#00c853; }

.item{
  border-top:1px solid #222;
  padding:15px 0;
}

.btn{
  display:inline-block;
  margin-top:25px;
  background:#ff2a2a;
  color:white;
  padding:14px 22px;
  border-radius:14px;
  text-decoration:none;
  font-weight:bold;
}

.ready_pickup{ background:#9c27b0; }
.picked_up{ background:#00c853; }

</style>
</head>

<body>

<div class="card" id="pedido">
  Cargando pedido...
</div>

<script>
const supabaseUrl = "https://vegbamfkmcyvgvnjmxgs.supabase.co";
const supabaseKey = "sb_publishable_BFRP4PzzRhvUw3OF0NZtpw_gXjejWn9";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

function formatearFechaAndreani(fecha) {
  if (!fecha) return "";

  const fechaCompatible = String(fecha).replace(
    /(\.\d{3})\d+/,
    "$1"
  );

  const valor = new Date(fechaCompatible);

  if (Number.isNaN(valor.getTime())) {
    return fecha;
  }

  return valor.toLocaleString("es-AR", {
    dateStyle: "short",
    timeStyle: "short"
  });
}

function nombreEventoAndreani(evento) {
  const nombres = {
    OrdenDeEnvioSolicitada: "Envío solicitado",
    OrdenDeEnvioCreada: "Orden de envío creada"
  };

  return nombres[evento] || evento || "Actualización del envío";
}

function alternarSeguimiento() {
  const historial = document.getElementById("historialAndreani");
  const boton = document.getElementById("botonSeguimientoAndreani");

  if (!historial || !boton) return;

  const oculto = historial.style.display === "none";

  historial.style.display = oculto ? "block" : "none";
  boton.textContent = oculto
    ? "Ocultar seguimiento"
    : "Seguir envío";
}

async function cargarPedido(){

  const contenedor = document.getElementById("pedido");

  if(!token){
  contenedor.innerHTML = "<h1>Pedido no encontrado</h1>";
  return;
}

  const { data: pedido, error } = await supabaseClient
    .from("orders")
    .select(`
      *,
      order_items (*)
    `)
    .eq("tracking_token", token)
    .single();

  if(error || !pedido){
    contenedor.innerHTML = "<h1>Pedido no encontrado</h1>";
    return;
  }

  let andreani = null;

try {
  const respuestaAndreani = await fetch(
    `https://usina-rhodia-production.up.railway.app/pedido-andreani/${token}`
  );

  andreani = await respuestaAndreani.json();

} catch (errorAndreani) {
  console.log(
    "No se pudo consultar Andreani:",
    errorAndreani
  );
}

  let estadoTexto = pedido.status;

if (pedido.status === "pending") {
  estadoTexto = "Pendiente de pago";
}

if (pedido.status === "paid") {
  estadoTexto = "Pago aprobado";
}

if (pedido.status === "preparado") {
  estadoTexto = "Preparando pedido";
}

if (pedido.status === "enviado") {
  estadoTexto = "Pedido enviado";
}

if (pedido.status === "entregado") {
  estadoTexto = "Pedido entregado";
}

if (pedido.status === "ready_pickup") {
  estadoTexto = "Listo para retirar";
}

if (pedido.status === "picked_up") {
  estadoTexto = "Pedido retirado";
}

  contenedor.innerHTML = `
    <h1>Pedido #${pedido.id}</h1>

    <p><b>Cliente:</b> ${pedido.customer_name}</p>
    <p><b>Email:</b> ${pedido.customer_email}</p>
    <p><b>Teléfono:</b> ${pedido.customer_phone}</p>
    <p><b>Entrega:</b> ${pedido.delivery_method}</p>
    <p><b>Dirección:</b> ${pedido.address || "-"}</p>
    ${andreani?.tieneEnvioAndreani ? `
  <div style="
    margin:20px 0;
    padding:18px;
    background:#181818;
    border:1px solid #2a2a2a;
    border-radius:14px;
  ">
    <p style="margin:0 0 8px;">
      <b>Código Andreani:</b> ${andreani.numeroEnvio}
    </p>

    <p style="margin:0 0 14px;">
      <b>Estado actual:</b>
      ${andreani.eventos?.[0]?.estado || andreani.estado}
    </p>

    <button
      type="button"
      id="botonSeguimientoAndreani"
      class="btn"
      style="border:none;cursor:pointer;margin-top:5px;"
      onclick="alternarSeguimiento()"
    >
      Seguir envío
    </button>

    <div
      id="historialAndreani"
      style="display:none;margin-top:22px;"
    >
      <h3 style="margin-bottom:16px;">
        Historial del envío
      </h3>

      ${andreani.eventos?.length ? andreani.eventos.map(evento => `
        <div style="
          padding:14px 0;
          border-top:1px solid #333;
        ">
          <div style="font-weight:bold;margin-bottom:5px;">
            ${nombreEventoAndreani(evento.evento)}
          </div>

          ${evento.estado ? `
            <div style="margin-bottom:4px;">
              ${evento.estado}
            </div>
          ` : ""}

          ${evento.fecha ? `
            <div style="font-size:14px;color:#aaa;">
              ${formatearFechaAndreani(evento.fecha)}
            </div>
          ` : ""}

          ${evento.sucursal ? `
            <div style="font-size:14px;color:#aaa;margin-top:4px;">
              ${evento.sucursal}
            </div>
          ` : ""}
        </div>
      `).join("") : `
        <p>Todavía no hay movimientos registrados.</p>
      `}
    </div>
  </div>
` : ""}



    <div class="estado ${pedido.status}">
      ${estadoTexto}
    </div>

    <h2>Productos</h2>

    ${pedido.order_items.map(item => `
      <div class="item">
        <b>${item.product_name}</b><br>
        Talle: ${item.size}<br>
        Cantidad: ${item.quantity}<br>
        Precio unitario: $${item.unit_price}
      </div>
    `).join("")}

    <h2>Total: $${pedido.total}</h2>

    <a href="index.html" class="btn">Volver a la tienda</a>
  `;
}

cargarPedido();
</script>

</body>
</html>
