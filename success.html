<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pago aprobado | USINA RHODIA</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:Arial, Helvetica, sans-serif;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;
      padding:20px;
    }

    .card{
      background:#111;
      border:1px solid #222;

      width:100%;
      max-width:600px;

      padding:50px;
      border-radius:24px;

      text-align:center;
    }

    .check{
      font-size:70px;
      margin-bottom:20px;
    }

    h1{
      font-size:42px;
      margin-bottom:15px;
    }

    p{
      color:#bdbdbd;
      font-size:18px;
      line-height:1.6;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;

      background:#ff2a2a;
      color:white;

      text-decoration:none;

      padding:18px 30px;
      border-radius:14px;

      font-weight:bold;
      font-size:15px;

      transition:.2s;
    }

    .btn:hover{
      opacity:.9;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="check">✅</div>

    <h1>Pago aprobado</h1>

    <p>
      Tu compra fue realizada correctamente.
      En breve vamos a preparar tu pedido.
    </p>

    <a id="btnPedido" href="index.html" class="btn">
  VER MI PEDIDO
</a>

  </div>

<script>
const params = new URLSearchParams(window.location.search);
const attemptId = params.get("attempt_id");

const btnPedido = document.getElementById("btnPedido");

if (attemptId) {
  btnPedido.href = "index.html";
  btnPedido.textContent = "TU PEDIDO SE ESTÁ PROCESANDO";
} else {
  btnPedido.href = "index.html";
  btnPedido.textContent = "VOLVER A LA TIENDA";
}
</script>
</body>
</html>
